<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Приглашение на свадьбу</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Georgia', serif; background-color: #fcfbf8; color: #5a5a5a; line-height: 1.6; }
        
        section { 
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; 
            text-align: center; padding: 40px 20px; background-size: cover; background-position: center;
        }

        .card { 
            background: rgba(255, 255, 255, 0.85); padding: 40px; border-radius: 20px; 
            max-width: 500px; width: 100%; border: 1px solid #e0dcd5;
        }

        h1 { font-family: 'Cursive', sans-serif; font-size: 2.5rem; color: #8a9a5b; margin-bottom: 20px; }
        .date { font-size: 1.5rem; font-weight: bold; color: #8a9a5b; margin: 20px 0; }
        
        img { max-width: 100%; height: auto; border-radius: 10px; margin: 15px 0; }
        
        .map-btn { 
            display: inline-block; background-color: #8a9a5b; color: white; padding: 12px 25px; 
            text-decoration: none; border-radius: 30px; margin-top: 20px; font-size: 0.9rem;
        }
    </style>
</head>
<body style="background-image: url('1000031626.jpg'); background-attachment: fixed;">

    <section>
        <div class="card">
            <h1>Азамат & Эльвира</h1>
            <p>Приглашаем вас разделить с нами самый важный день</p>
            <div class="date">18 ИЮЛЯ 2026</div>
            
            <img src="1000031627.jpg" alt="Кольца">
            <img src="1000031628.jpg" alt="Календарь">
            
            <p>Ресторан «Хванчкара», Балашиха, ул. Советская, 36</p>
            <a href="https://yandex.ru/maps/?text=Балашиха+Советская+36" class="map-btn">Схема проезда</a>
        </div>
    </section>

</body>
</
